<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Sign Up — HMS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #f0f4f8; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
        }
        h2 { color: #2d3748; margin-bottom: 1.5rem; text-align: center; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.4rem; color: #4a5568; font-size: 0.9rem; }
        input { 
            width: 100%; 
            padding: 0.6rem 0.8rem; 
            border: 1px solid #cbd5e0; 
            border-radius: 8px; 
            font-size: 0.95rem;
            outline: none;
        }
        input:focus { border-color: #48bb78; }
        button {
            width: 100%;
            padding: 0.75rem;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        button:hover { background: #38a169; }
        .link { text-align: center; margin-top: 1rem; font-size: 0.9rem; }
        .link a { color: #48bb78; text-decoration: none; }
        .error { color: #e53e3e; font-size: 0.85rem; margin-top: 0.3rem; }
        .messages { margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🧑‍🦯 Patient Sign Up</h2>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p class="error">{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    {% for error in field.errors %}
                        <p class="error">{{ error }}</p>
                    {% endfor %}
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit">Sign Up as Patient</button>
        </form>

        <div class="link">
            Already have an account? <a href="{% url 'login' %}">Login</a>
        </div>
    </div>
</body>
</html>
